<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 관리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="js/asset.js" defer></script>
    <script src="js/barChart.js" defer></script>
    <script src="js/calender.js" defer></script>
    <script src="js/pieChart.js" defer></script>
    
    <link rel="stylesheet" href="css/style.css">
    
    
    
</head>

<body >
    
<div class="dashboard-container">
    <header class="header">
        <div class="logo-box">(로고)</div>
        <div class="user-info">
            <span style="font-size: 14px;">계정 관리</span>
            <div class="user-id-box">(아이디)</div>
        </div>
    </header>

    <div class="main-content">
        
        <aside class="left-panel">
            <div class="box daily-summary">
                <div>
                    <strong>00월 00일</strong><br>
                    <h2>000,000,000원</h2>
                    <span style="font-size: 12px;">0000. 00. 00 00:00 갱신</span>
                </div>
            </div>

            <div class="box pie-chart">
                <canvas id="assetPieChart"></canvas>

            </div>

            <table class="asset-table" id="assetTable">
                <thead>
                    <tr>
                        <th>유형</th>
                        <th>금액</th>
                        <th style="width: 15%;"></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- <tr>
                        <td>예금</td>
                        <td>50,000,000원</td>
                        <td><button class="delete-btn">X</button></td>
                        
                    </tr>
                    <tr>
                        <td>저축</td>
                        <td>30,000,000원</td>
                        <td><button class="delete-btn">X</button></td>
                    </tr>
                    <tr>
                        <td>주식투자</td>
                        <td>10,000,000원</td>
                        <td><button class="delete-btn">X</button></td>
                    </tr> -->
                </tbody>
            </table>
            
            <button class="add-btn" >+</button> <button class="load-prev-btn", hidden>어제 기록 불러오기</button>
        </aside>

        <main class="right-panel">
            <div class="box month-selector">
                <span id="prevMonth" style="cursor: pointer;">&lt;</span>
                <span id="monthYear">yyyy년 mm월</span>
                <span id="nextMonth" style="cursor: pointer;">&gt;</span>
            </div>
            <div class="box main-chart">
                <canvas id="monthlyLineChart"></canvas>
            </div>

            <div class="calendar-wrapper">
                <ul class="weeks">
                    <li>일</li>
                    <li>월</li>
                    <li>화</li>
                    <li>수</li>
                    <li>목</li>
                    <li>금</li>
                    <li>토</li>
                </ul>
                <div id="calendarGrid" class="calendar-grid">
                    </div>
            </div>
        </main>

    </div>
</div>
    
</body>

</html>
